<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="日々の体重と体脂肪率を記録・管理するWebアプリ">
    <meta name="theme-color" content="#4CAF50">

    <!-- PWA設定 -->
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/svg+xml" href="./icons/favicon.svg">
    <link rel="apple-touch-icon" href="./icons/favicon.svg">

    <title>体重管理アプリ</title>

    <!-- スタイルシート -->
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="container">
        <!-- ヘッダー -->
        <header class="header">
            <h1>📊 体重管理アプリ</h1>
            <button id="settingsBtn" class="settings-btn" title="設定">⚙️</button>
        </header>

        <!-- メインコンテンツ -->
        <main class="main-content">
            <!-- カレンダーセクション -->
            <section class="calendar-section">
                <div class="calendar-header">
                    <button id="prevMonth" class="month-nav-btn">◀</button>
                    <h2 id="currentMonth"></h2>
                    <button id="nextMonth" class="month-nav-btn">▶</button>
                </div>
                <div id="calendar" class="calendar-grid"></div>
            </section>

            <!-- 入力フォームセクション -->
            <section class="input-section">
                <h2>データ入力</h2>
                <div class="selected-date">
                    <span id="selectedDateDisplay"></span>
                </div>
                <form id="dataForm" class="data-form">
                    <div class="form-group">
                        <label for="weight">体重 (kg)</label>
                        <input type="number" id="weight" name="weight" step="0.1" min="0" max="300" placeholder="70.5" required>
                    </div>
                    <div class="form-group">
                        <label for="bodyFat">体脂肪率 (%)</label>
                        <input type="number" id="bodyFat" name="bodyFat" step="0.1" min="0" max="100" placeholder="18.5" required>
                    </div>
                    <div class="bmi-display" id="bmiDisplay" style="display: none;">
                        <label>BMI</label>
                        <div class="bmi-value">
                            <span id="bmiValue">-</span>
                            <span class="bmi-category" id="bmiCategory"></span>
                        </div>
                    </div>
                    <div class="form-buttons">
                        <button type="submit" class="btn btn-primary">保存</button>
                        <button type="button" id="deleteBtn" class="btn btn-danger" style="display: none;">削除</button>
                    </div>
                </form>
            </section>

            <!-- グラフセクション -->
            <section class="chart-section">
                <h2>推移グラフ</h2>
                <div class="chart-period-selector">
                    <button class="period-btn active" data-period="30">30日</button>
                    <button class="period-btn" data-period="90">3ヶ月</button>
                    <button class="period-btn" data-period="180">6ヶ月</button>
                    <button class="period-btn" data-period="365">1年</button>
                </div>
                <div class="chart-container">
                    <canvas id="weightChart"></canvas>
                </div>
            </section>
        </main>
    </div>

    <!-- 身長設定モーダル -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⚙️ 設定</h2>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="heightInput">身長 (cm)</label>
                    <input type="number" id="heightInput" step="0.1" min="100" max="250" placeholder="170.0">
                    <small>BMI計算に使用されます</small>
                </div>
            </div>
            <div class="modal-footer">
                <button id="saveSettings" class="btn btn-primary">保存</button>
            </div>
        </div>
    </div>

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <!-- アプリケーションスクリプト -->
    <script src="./js/storage.js"></script>
    <script src="./js/calendar.js"></script>
    <script src="./js/chart.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
